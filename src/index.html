    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "BTC Insights",
          "url": "https://explore21.com/",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://explore21.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "BTC Insights",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web",
          "description": "Free Bitcoin blockchain explorer for address lookup, transaction tracking, blocks, and mining statistics.",

    <script defer src="https://kit.fontawesome.com/8a3442c427.js" crossorigin="anonymous"></script>
    <style>
      body {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <script>
      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });
      let lastTouchEnd = 0;
      document.addEventListener(
        "touchend",
        function (event) {
          let now = new Date().getTime();
          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        },
        false
      );
    </script>
    <app-root></app-root>
  </body>
