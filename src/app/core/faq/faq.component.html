<div class="max-w-screen-lg mx-6 lg:mx-auto py-8 px-4 md:px-8 mb-12 text-white">

  <div class="mb-10">
    <h1 class="font-bold text-3xl md:text-4xl mb-3 fade-col">Frequently Asked Questions</h1>
    <p class="text-gray-400 text-lg">Everything you need to know about using the BTC Insights explorer.</p>
  </div>

  <div class="space-y-3">
    <div
      *ngFor="let faq of faqs; let i = index"
      class="border border-gray-700 rounded-2xl overflow-hidden"
    >
      <button
        (click)="toggle(i)"
        class="w-full flex items-center justify-between px-6 py-4 text-left bg-gray-900/30 hover:bg-gray-800/50 transition-colors duration-200"
      >
        <span class="font-medium text-white pr-4">{{ faq.question }}</span>
        <span class="text-orange-400 text-lg flex-shrink-0 transition-transform duration-200" [class.rotate-45]="faq.open">+</span>
      </button>
      <div
        *ngIf="faq.open"
        class="px-6 py-4 text-gray-300 leading-relaxed border-t border-gray-700 bg-gray-900/10"
      >
        {{ faq.answer }}
      </div>
    </div>
  </div>

  <div class="mt-10 border border-gray-700 rounded-2xl p-6 bg-gray-900/30 text-center">
    <p class="text-gray-400">Still have a question?</p>
    <p class="text-gray-300 mt-1">
      Try the <a routerLink="/about" class="text-orange-400 hover:text-orange-300 underline">About page</a>
      or reach out via the <a routerLink="/donate" class="text-orange-400 hover:text-orange-300 underline">Donate page</a>.
    </p>
  </div>
</div>
