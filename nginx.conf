server {
    listen 4200;

    location /api/ {
        proxy_pass https://api.explore21.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.explore21.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    location = /robots.txt {
        root /usr/share/nginx/html;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        root /usr/share/nginx/html;
        try_files /sitemap.xml =404;
    }

    location = /llms.txt {
        root /usr/share/nginx/html;
        try_files /llms.txt =404;
    }

    # Long-lived cache for content-hashed JS/CSS bundles
    location ~* "\.[0-9a-f]{16,}\.(js|css)$" {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Medium-lived cache for static assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}